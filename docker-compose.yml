services:
  postgres:
    image: postgres:17
    container_name: sanctuary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - sanctuary_postgres_data:/var/lib/postgresql/data

volumes:
  sanctuary_postgres_data:
