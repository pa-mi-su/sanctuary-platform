name: API Build
on:
  pull_request:
    branches:
      - dev
      - uat
      - prod
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/api-prod-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: api-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run API tests
        run: mvn -q test
        working-directory: apps/api
