name: API Prod Deploy

on:
  push:
    branches:
      - prod-ready-web-shell
    paths:
      - "apps/api/**"
      - ".github/workflows/api-prod-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: api-prod-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      API_ECR_REPOSITORY: ${{ vars.API_PROD_ECR_REPOSITORY }}
      API_APP_RUNNER_SERVICE_ARN: ${{ vars.API_PROD_APP_RUNNER_SERVICE_ARN }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run API tests
        run: mvn -q test
        working-directory: apps/api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Normalize deploy variables
        run: |
          echo "API_ECR_REPOSITORY=$(echo -n "${API_ECR_REPOSITORY}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"
          echo "API_APP_RUNNER_SERVICE_ARN=$(echo -n "${API_APP_RUNNER_SERVICE_ARN}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "${ECR_REGISTRY}/${API_ECR_REPOSITORY}:${IMAGE_TAG}" -f apps/api/Dockerfile apps/api
          docker push "${ECR_REGISTRY}/${API_ECR_REPOSITORY}:${IMAGE_TAG}"

      - name: Trigger App Runner deployment
        run: aws apprunner start-deployment --service-arn "${API_APP_RUNNER_SERVICE_ARN}"
