name: Web Prod Deploy

on:
  push:
    branches:
      - prod-ready-web-shell
    paths:
      - "apps/web/**"
      - "package-lock.json"
      - "package.json"
      - ".github/workflows/web-prod-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: web-prod-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      WEB_S3_BUCKET: ${{ vars.WEB_PROD_S3_BUCKET }}
      WEB_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.WEB_PROD_CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular web app
        run: npm run build --workspace web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Normalize deploy variables
        run: |
          echo "WEB_S3_BUCKET=$(echo -n "${WEB_S3_BUCKET}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"
          echo "WEB_CLOUDFRONT_DISTRIBUTION_ID=$(echo -n "${WEB_CLOUDFRONT_DISTRIBUTION_ID}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"

      - name: Sync web build to S3
        run: aws s3 sync apps/web/dist/web/browser "s3://${WEB_S3_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${WEB_CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
