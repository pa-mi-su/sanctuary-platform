name: Web Build
on:
  pull_request:
    branches:
      - dev
      - uat
      - prod
      - main
    paths:
      - "apps/web/**"
      - "package-lock.json"
      - "package.json"
      - ".github/workflows/web-prod-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: web-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular web app
        run: npm run build --workspace web
