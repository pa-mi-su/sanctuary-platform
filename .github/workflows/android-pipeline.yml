name: Android Pipeline

on:
  pull_request:
    branches:
      - dev
      - uat
      - prod
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-pipeline.yml"
  push:
    branches:
      - dev
      - uat
      - main
    paths:
      - "apps/android/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLAY_PACKAGE_NAME: ${{ vars.ANDROID_PLAY_PACKAGE_NAME || 'com.pamisu.sanctuary' }}

jobs:
  validate:
    name: Validate Android Build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          chmod +x ./gradlew

      - name: Validate Android Gradle project
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew assembleDevDebug

  build-dev:
    name: Upload Android Dev Artifact
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
      ANDROID_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          if [[ -n "${ANDROID_UPLOAD_KEYSTORE_BASE64:-}" ]]; then
            echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-upload-keystore.jks"
            echo "ANDROID_UPLOAD_KEYSTORE_PATH=${RUNNER_TEMP}/android-upload-keystore.jks" >> "$GITHUB_ENV"
          fi
          chmod +x ./gradlew

      - name: Build Android dev release bundle
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_VERSION_CODE="$(git rev-list --count HEAD)"
          ./gradlew bundleDevRelease

      - name: Upload Android dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-android-dev-release-${{ github.sha }}
          path: apps/android/app/build/outputs/bundle/devRelease/app-dev-release.aab
          if-no-files-found: error

      - name: Upload Android dev bundle to Play internal testing
        if: env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON != '' && env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PLAY_PACKAGE_NAME }}
          releaseFiles: apps/android/app/build/outputs/bundle/devRelease/app-dev-release.aab
          track: internal
          status: draft

  build-uat:
    name: Upload Android UAT Artifact
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    environment: uat
    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
      ANDROID_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          if [[ -n "${ANDROID_UPLOAD_KEYSTORE_BASE64:-}" ]]; then
            echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-upload-keystore.jks"
            echo "ANDROID_UPLOAD_KEYSTORE_PATH=${RUNNER_TEMP}/android-upload-keystore.jks" >> "$GITHUB_ENV"
          fi
          chmod +x ./gradlew

      - name: Build Android UAT release bundle
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_VERSION_CODE="$(git rev-list --count HEAD)"
          ./gradlew bundleUatRelease

      - name: Upload Android UAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-android-uat-release-${{ github.sha }}
          path: apps/android/app/build/outputs/bundle/uatRelease/app-uat-release.aab
          if-no-files-found: error

      - name: Upload Android UAT bundle to Play closed testing
        if: env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON != '' && env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PLAY_PACKAGE_NAME }}
          releaseFiles: apps/android/app/build/outputs/bundle/uatRelease/app-uat-release.aab
          track: beta
          status: draft

  build-prod:
    name: Upload Android Production Artifact
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
      ANDROID_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          if [[ -n "${ANDROID_UPLOAD_KEYSTORE_BASE64:-}" ]]; then
            echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-upload-keystore.jks"
            echo "ANDROID_UPLOAD_KEYSTORE_PATH=${RUNNER_TEMP}/android-upload-keystore.jks" >> "$GITHUB_ENV"
          fi
          chmod +x ./gradlew

      - name: Build Android prod release bundle
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_VERSION_CODE="$(git rev-list --count HEAD)"
          ./gradlew bundleProdRelease

      - name: Upload Android production artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-android-prod-release-${{ github.sha }}
          path: apps/android/app/build/outputs/bundle/prodRelease/app-prod-release.aab
          if-no-files-found: error

      - name: Upload Android production bundle to Play production draft
        if: env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON != '' && env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PLAY_PACKAGE_NAME }}
          releaseFiles: apps/android/app/build/outputs/bundle/prodRelease/app-prod-release.aab
          track: production
          status: draft
