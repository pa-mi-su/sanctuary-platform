            fi
          fi

          echo "ANDROID_VERSION_CODE=${next_version_code}" >> "$GITHUB_ENV"
          echo "Using Android version code ${next_version_code}."

      - name: Build Android UAT release bundle
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew bundleUatRelease

      - name: Upload Android UAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-android-uat-release-${{ github.sha }}
          path: apps/android/app/build/outputs/bundle/uatRelease/app-uat-release.aab
          if-no-files-found: error

      - name: Upload Android UAT bundle to Play closed testing
        if: env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON != '' && env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PLAY_PACKAGE_NAME }}
          releaseFiles: apps/android/app/build/outputs/bundle/uatRelease/app-uat-release.aab
          track: beta
          status: draft

  build-prod:
    name: Upload Android Production Artifact
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
      ANDROID_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
