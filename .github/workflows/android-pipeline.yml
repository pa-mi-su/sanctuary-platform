          token_format: access_token

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          if [[ -n "${ANDROID_UPLOAD_KEYSTORE_BASE64:-}" ]]; then
            echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-upload-keystore.jks"
            echo "ANDROID_UPLOAD_KEYSTORE_PATH=${RUNNER_TEMP}/android-upload-keystore.jks" >> "$GITHUB_ENV"
          fi
          chmod +x ./gradlew

      - name: Resolve next Android version code
        shell: bash
        env:
          PLAY_ACCESS_TOKEN: ${{ steps.play-auth.outputs.access_token }}
        run: |
          set -euo pipefail

          next_version_code="${GITHUB_RUN_NUMBER:-1}"

          if [[ -n "${PLAY_ACCESS_TOKEN:-}" ]]; then
