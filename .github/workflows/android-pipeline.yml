name: Android Pipeline

on:
  pull_request:
    branches:
      - dev
      - uat
      - prod
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-pipeline.yml"
  push:
    branches:
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Android Build
    runs-on: ubuntu-latest
    outputs:
      has_android_app: ${{ steps.detect.outputs.has_android_app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect Android project
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "apps/android/gradlew" ]] || [[ -f "apps/android/build.gradle.kts" ]] || [[ -f "apps/android/settings.gradle.kts" ]]; then
            echo "has_android_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java 21
        if: steps.detect.outputs.has_android_app == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Validate Android Gradle project
        if: steps.detect.outputs.has_android_app == 'true'
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew help

      - name: Android scaffold placeholder
        if: steps.detect.outputs.has_android_app != 'true'
        run: echo "Android pipeline is configured and waiting for the Android app scaffold in apps/android."

  upload-internal:
    name: Upload Android Internal Build
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.validate.outputs.has_android_app == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Android release placeholder
        run: echo "Android release automation will be added once the Android app and Play signing configuration are in place."
