name: Android Pipeline

on:
  pull_request:
    branches:
      - dev
      - uat
      - prod
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-pipeline.yml"
  push:
    branches:
      - dev
      - uat
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLAY_PACKAGE_NAME: ${{ vars.ANDROID_PLAY_PACKAGE_NAME || 'com.pamisu.sanctuary' }}

jobs:
  validate:
    name: Validate Android Build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          chmod +x ./gradlew

      - name: Validate Android Gradle project
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew assembleDevDebug

  build-dev:
    name: Upload Android Dev Artifact
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
      ANDROID_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Authenticate to Google Play
        id: play-auth
        if: env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          token_format: access_token

      - name: Prepare Android SDK path
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_PATH}" ]]; then
            echo "::error::Android SDK is not configured on this runner."
            exit 1
          fi

          echo "sdk.dir=${SDK_PATH}" > local.properties
          if [[ -n "${ANDROID_UPLOAD_KEYSTORE_BASE64:-}" ]]; then
            echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-upload-keystore.jks"
            echo "ANDROID_UPLOAD_KEYSTORE_PATH=${RUNNER_TEMP}/android-upload-keystore.jks" >> "$GITHUB_ENV"
          fi
          chmod +x ./gradlew

      - name: Resolve next Android version code
        shell: bash
        env:
          PLAY_ACCESS_TOKEN: ${{ steps.play-auth.outputs.access_token }}
        run: |
          set -euo pipefail

          next_version_code="${GITHUB_RUN_NUMBER:-1}"

          if [[ -n "${PLAY_ACCESS_TOKEN:-}" ]]; then
            api_base="https://androidpublisher.googleapis.com/androidpublisher/v3/applications/${ANDROID_PLAY_PACKAGE_NAME}"

            edit_response="$(curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${PLAY_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "${api_base}/edits")"

            edit_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))' <<< "${edit_response}")"

            if [[ -z "${edit_id}" ]]; then
              echo "::error::Unable to create Google Play edit for ${ANDROID_PLAY_PACKAGE_NAME}."
              exit 1
            fi

            cleanup() {
              curl -fsSL \
                -X DELETE \
                -H "Authorization: Bearer ${PLAY_ACCESS_TOKEN}" \
                "${api_base}/edits/${edit_id}" >/dev/null || true
            }

            trap cleanup EXIT

            max_version_code=0

            for track in internal alpha beta production; do
              response_file="$(mktemp)"
              http_code="$(curl -sS \
                -o "${response_file}" \
                -w "%{http_code}" \
                -H "Authorization: Bearer ${PLAY_ACCESS_TOKEN}" \
                "${api_base}/edits/${edit_id}/tracks/${track}")"

              if [[ "${http_code}" == "200" ]]; then
                track_max="$(python3 -c 'import json,sys; payload=json.load(open(sys.argv[1], "r", encoding="utf-8")); codes=[int(value) for release in payload.get("releases", []) for value in (release.get("versionCodes", []) or []) if str(value).isdigit()]; print(max(codes) if codes else 0)' "${response_file}")"

                if (( track_max > max_version_code )); then
                  max_version_code="${track_max}"
                fi
              elif [[ "${http_code}" != "404" ]]; then
                cat "${response_file}" >&2
                echo "::error::Unable to inspect Google Play track '${track}'."
                exit 1
              fi

              rm -f "${response_file}"
            done

            if (( max_version_code > 0 )); then
              next_version_code="$((max_version_code + 1))"
            fi
          fi

          echo "ANDROID_VERSION_CODE=${next_version_code}" >> "$GITHUB_ENV"
          echo "Using Android version code ${next_version_code}."

      - name: Build Android dev release bundle
        working-directory: apps/android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew bundleDevRelease

      - name: Upload Android dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-android-dev-release-${{ github.sha }}
          path: apps/android/app/build/outputs/bundle/devRelease/app-dev-release.aab
          if-no-files-found: error

      - name: Upload Android dev bundle to Play internal testing
        if: env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON != '' && env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PLAY_PACKAGE_NAME }}
          releaseFiles: apps/android/app/build/outputs/bundle/devRelease/app-dev-release.aab
          track: internal
          status: draft

  build-uat:
    name: Upload Android UAT Artifact
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    environment: uat
    env:
